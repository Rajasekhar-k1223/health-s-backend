events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Backend API Server upstream
    upstream backend_api {
        server backend:8000;
    }

    # Redirect all HTTP traffic to HTTPS for HIPAA compliance
    server {
        listen 80;
        server_name localhost sentinel-health.local;
        return 301 https://$host$request_uri;
    }

    # Secure HTTPS Server
    server {
        listen 443 ssl;
        server_name localhost sentinel-health.local;

        # Self-signed cert paths (mounted via Docker volumes)
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Route API traffic to FastAPI backend
        location /api/ {
            proxy_pass http://backend_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Route WebSocket traffic to FastAPI backend
        location /ws/ {
            proxy_pass http://backend_api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Route frontend traffic (React)
        location / {
            # In a true prod env, this would serve static files. 
            # For this docker setup, we might proxy to the Vite dev server if running,
            # or serve a static build directory.
            # Assuming we proxy to a running frontend container on port 5173
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
